upstream drapixai_web {
    server web:3000;
}

upstream drapixai_api {
    server api:8000;
}

server {
    listen 80;
    server_name drapixai.com www.drapixai.com api.drapixai.com;
    client_max_body_size 20m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name drapixai.com www.drapixai.com;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/drapixai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drapixai.com/privkey.pem;

    location / {
        proxy_pass http://drapixai_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name api.drapixai.com;
    client_max_body_size 20m;

    ssl_certificate /etc/letsencrypt/live/drapixai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drapixai.com/privkey.pem;

    location / {
        proxy_pass http://drapixai_api;
        proxy_http_version 1.1;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

